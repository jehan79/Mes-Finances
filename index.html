<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<meta name="mobile-web-app-capable" content="yes">
<title>Mes Finances</title>
<link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk1lcyBGaW5hbmNlcyIsCiAgInNob3J0X25hbWUiOiAiRmluYW5jZXMiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzBhMGExYSIsCiAgInRoZW1lX2NvbG9yIjogIiMwYTBhMWEiCn0=">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,800;1,9..40,400&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a1a;--bg2:#111128;--bg3:#1a1a3e;
  --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
  --border:rgba(255,255,255,0.06);
  --text:#e8e8f0;--text2:#999;--text3:#555;
  --red:#E94560;--orange:#F5A623;--purple:#7B68EE;
  --cyan:#00BCD4;--green:#4CAF50;--gold:#FFD700;--blue:#4FC3F7;
  --font:'DM Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative;overflow:hidden}

/* ─── Header ─── */
.header{padding:calc(var(--safe-top) + 16px) 20px 10px;text-align:center;flex-shrink:0;position:relative}
.header::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.header h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--red),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.5px}
.header p{font-size:11px;color:var(--text3);margin-top:2px;letter-spacing:1px;text-transform:uppercase}

/* ─── Month nav ─── */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0;flex-shrink:0}
.month-nav button{background:var(--surface2);border:none;color:var(--text2);font-size:16px;width:36px;height:36px;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.month-nav button:active{background:rgba(233,69,96,0.2)}
.month-nav span{font-size:14px;font-weight:800;color:var(--text);min-width:160px;text-align:center;text-transform:capitalize}

/* ─── Scrollable content ─── */
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 100px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.scroll::-webkit-scrollbar{display:none}

/* ─── Total hero ─── */
.total-hero{background:linear-gradient(135deg,var(--red),#c73350);border-radius:20px;padding:22px 20px;text-align:center;margin-bottom:14px;box-shadow:0 8px 40px rgba(233,69,96,0.25);position:relative;overflow:hidden}
.total-hero::before{content:'';position:absolute;top:-30%;right:-20%;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.06)}
.total-hero .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;opacity:0.8}
.total-hero .amount{font-family:var(--mono);font-size:26px;font-weight:700;margin:6px 0 4px;letter-spacing:-1px}
.total-hero .count{font-size:11px;opacity:0.6}

/* ─── Cards ─── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.card h3{font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

/* ─── Category rows ─── */
.cat-row{margin-bottom:16px}
.cat-row:last-child{margin-bottom:0}
.cat-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.cat-left{display:flex;align-items:center;gap:8px}
.cat-icon{font-size:16px}
.cat-name{font-size:12px;font-weight:600;color:var(--text)}
.cat-count{font-size:9px;color:var(--text3);margin-left:4px}
.cat-amount{font-family:var(--mono);font-size:13px;font-weight:700}
.cat-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:4px}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.cat-pct{font-size:9px;color:var(--text3);text-align:right;margin-top:2px}

/* ─── Mini chart ─── */
.chart{display:flex;align-items:flex-end;gap:3px;height:130px;padding:10px 0;overflow-x:auto}
.chart::-webkit-scrollbar{display:none}
.chart-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:24px;flex:0 0 auto}
.chart-val{font-size:7px;color:var(--text3);font-family:var(--mono)}
.chart-bar{width:16px;border-radius:4px 4px 0 0;background:linear-gradient(180deg,var(--red),var(--purple));min-height:3px;transition:height .5s cubic-bezier(.4,0,.2,1)}
.chart-day{font-size:8px;color:var(--text3)}

/* ─── Form ─── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.form-input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border .2s}
.form-input:focus{border-color:var(--blue)}
.form-input-big{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:-0.5px}

.cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;border-radius:12px;border:1px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;color:var(--text)}
.cat-btn span:first-child{font-size:20px}
.cat-btn span:last-child{font-size:9px;font-weight:700}
.cat-btn.active{border-width:2px}
.cat-btn:active{transform:scale(0.95)}

.pay-row{display:flex;gap:6px;flex-wrap:wrap}
.pay-btn{padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s}
.pay-btn.active{background:rgba(79,195,247,0.12);border-color:var(--blue);color:var(--blue)}
.pay-btn:active{transform:scale(0.95)}

.btn-submit{width:100%;padding:16px;border:none;border-radius:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:transform .15s;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.btn-submit:active{transform:scale(0.97)}
.btn-green{background:linear-gradient(135deg,var(--green),#2E7D32)}
.btn-red{background:linear-gradient(135deg,var(--red),#c73350)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text2);box-shadow:none;margin-top:8px}

/* ─── History items ─── */
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hist-top{display:flex;align-items:center;gap:10px}
.hist-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hist-info{flex:1;min-width:0}
.hist-desc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-meta{font-size:10px;color:var(--text3);margin-top:2px}
.hist-amount{font-family:var(--mono);font-size:13px;font-weight:700;white-space:nowrap}
.hist-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.hist-btn{flex:1;padding:8px;border-radius:8px;border:none;background:var(--surface2);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.hist-btn:active{transform:scale(0.95)}
.hist-btn.del{color:var(--red)}

.empty{text-align:center;padding:50px 0}
.empty span{font-size:44px;display:block;margin-bottom:10px}
.empty p{color:var(--text3);font-size:13px}

.reset-btn{width:100%;padding:12px;background:transparent;border:1px solid rgba(233,69,96,0.25);border-radius:12px;color:var(--red);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);margin-top:20px}

/* ─── Bottom nav ─── */
.bottom-nav{display:flex;flex-shrink:0;padding:6px 12px calc(var(--safe-bottom) + 6px);background:var(--bg2);border-top:1px solid var(--border);gap:4px}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:12px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .2s;font-family:var(--font)}
.nav-btn.active{background:rgba(233,69,96,0.12);color:var(--red)}
.nav-btn span:first-child{font-size:20px}
.nav-btn span:last-child{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px}

/* ─── Toast ─── */
.toast{position:fixed;top:calc(var(--safe-top) + 12px);left:50%;transform:translateX(-50%) translateY(-100px);background:var(--bg3);color:var(--blue);padding:10px 24px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 8px 30px rgba(0,0,0,0.5);transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;border:1px solid var(--border)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>💎 Mes Finances</h1>
    <p>Suivi intelligent des dépenses</p>
  </div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="scroll" id="content"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard')">
      <span>📊</span><span>Synthèse</span>
    </button>
    <button class="nav-btn" data-view="add" onclick="switchView('add')">
      <span>➕</span><span>Ajouter</span>
    </button>
    <button class="nav-btn" data-view="history" onclick="switchView('history')">
      <span>📋</span><span>Historique</span>
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
// ─── State ───
const CATS = [
  {name:"Alimentation / Courses",color:"#E94560",icon:"🛒",short:"Aliments"},
  {name:"Transport",color:"#F5A623",icon:"🚕",short:"Transport"},
  {name:"Loisirs / Sorties",color:"#7B68EE",icon:"🎭",short:"Loisirs"},
  {name:"Abonnements",color:"#00BCD4",icon:"📱",short:"Abonnés"},
  {name:"Éducation / Formation",color:"#4CAF50",icon:"📚",short:"Éducation"},
  {name:"Épargne / Investissements",color:"#FFD700",icon:"💰",short:"Épargne"}
];
const PAYS = ["Espèces","Mobile Money","Carte bancaire","Virement"];

let expenses = [];
let currentView = "dashboard";
let currentMonth = new Date().toISOString().slice(0,7);
let editingId = null;
let form = {date:todayStr(),category:"",description:"",amount:"",payment:"Espèces",notes:""};

function todayStr(){return new Date().toISOString().split("T")[0]}
function fmtGNF(n){return (n||0).toLocaleString("fr-FR")+" GNF"}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ─── Storage ───
function load(){try{const d=localStorage.getItem("mf_expenses");if(d)expenses=JSON.parse(d)}catch{}}
function save(){try{localStorage.setItem("mf_expenses",JSON.stringify(expenses))}catch{}}

// ─── Toast ───
function toast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2200);
}

// ─── Month ───
function updateMonthLabel(){
  const d=new Date(currentMonth+"-01");
  document.getElementById("monthLabel").textContent=d.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
}
function changeMonth(delta){
  const d=new Date(currentMonth+"-01");d.setMonth(d.getMonth()+delta);
  currentMonth=d.toISOString().slice(0,7);updateMonthLabel();render();
}

// ─── Nav ───
function switchView(v){
  currentView=v;if(v!=="add")editingId=null;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.toggle("active",b.dataset.view===v));
  // update add button label
  const addBtn=document.querySelector('[data-view="add"] span:last-child');
  if(addBtn)addBtn.textContent=editingId?"Modifier":"Ajouter";
  render();
}

// ─── Filtered ───
function filtered(){return expenses.filter(e=>e.date&&e.date.startsWith(currentMonth))}

// ─── Render ───
function render(){
  const el=document.getElementById("content");
  const f=filtered();
  if(currentView==="dashboard")renderDashboard(el,f);
  else if(currentView==="add")renderForm(el);
  else renderHistory(el,f);
}

function renderDashboard(el,f){
  const total=f.reduce((s,e)=>s+(e.amount||0),0);
  const byCat=CATS.map(c=>{
    const items=f.filter(e=>e.category===c.name);
    return{...c,total:items.reduce((s,e)=>s+e.amount,0),count:items.length};
  });
  const maxCat=Math.max(...byCat.map(c=>c.total),1);

  // Daily chart data
  const daily={};
  f.forEach(e=>{daily[e.date]=(daily[e.date]||0)+e.amount});
  const days=Object.entries(daily).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxDay=Math.max(...days.map(d=>d[1]),1);

  let html=`
    <div class="total-hero">
      <div class="label">Dépenses du mois</div>
      <div class="amount">${fmtGNF(total)}</div>
      <div class="count">${f.length} transaction${f.length!==1?"s":""}</div>
    </div>
    <div class="card"><h3>Par catégorie</h3>
      ${byCat.map(c=>`
        <div class="cat-row">
          <div class="cat-head">
            <div class="cat-left">
              <span class="cat-icon">${c.icon}</span>
              <span class="cat-name">${c.name}</span>
              <span class="cat-count">${c.count}</span>
            </div>
            <span class="cat-amount" style="color:${c.color}">${fmtGNF(c.total)}</span>
          </div>
          <div class="cat-bar"><div class="cat-bar-fill" style="width:${(c.total/maxCat)*100}%;background:${c.color}"></div></div>
          ${total>0?`<div class="cat-pct">${((c.total/total)*100).toFixed(1)}%</div>`:""}
        </div>
      `).join("")}
    </div>`;

  if(days.length>1){
    html+=`<div class="card"><h3>Dépenses par jour</h3><div class="chart">
      ${days.map(([d,t])=>`
        <div class="chart-col">
          <span class="chart-val">${(t/1000).toFixed(0)}k</span>
          <div class="chart-bar" style="height:${Math.max((t/maxDay)*110,3)}px"></div>
          <span class="chart-day">${d.slice(8)}</span>
        </div>
      `).join("")}
    </div></div>`;
  }

  html+=`<button class="btn-submit btn-red" onclick="switchView('add')" style="margin-bottom:20px">➕ Nouvelle dépense</button>`;
  el.innerHTML=html;
  el.scrollTop=0;
}

function renderForm(el){
  el.innerHTML=`
    <div class="card">
      <h3>${editingId?"Modifier la dépense":"Nouvelle dépense"}</h3>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="f-date" value="${form.date}">
      </div>

      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <div class="cat-grid">
          ${CATS.map(c=>`
            <div class="cat-btn ${form.category===c.name?"active":""}" 
                 style="${form.category===c.name?`border-color:${c.color};background:${c.color}18`:""}"
                 onclick="selectCat('${c.name}')">
              <span>${c.icon}</span>
              <span style="color:${c.color}">${c.short}</span>
            </div>
          `).join("")}
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Montant (GNF)</label>
        <input type="number" class="form-input form-input-big" id="f-amount" placeholder="250 000" value="${form.amount}" inputmode="numeric">
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="f-desc" placeholder="ex: Courses au marché" value="${esc(form.description)}">
      </div>

      <div class="form-group">
        <label class="form-label">Mode de paiement</label>
        <div class="pay-row">
          ${PAYS.map(p=>`<div class="pay-btn ${form.payment===p?"active":""}" onclick="selectPay('${p}')">${p}</div>`).join("")}
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes (optionnel)</label>
        <input type="text" class="form-input" id="f-notes" placeholder="..." value="${esc(form.notes)}">
      </div>

      <button class="btn-submit btn-green" onclick="submitForm()">${editingId?"✏️ Sauvegarder":"✅ Enregistrer"}</button>
      ${editingId?`<button class="btn-submit btn-ghost" onclick="cancelEdit()">Annuler</button>`:""}
    </div>`;
  el.scrollTop=0;
}

function renderHistory(el,f){
  if(f.length===0){
    el.innerHTML=`<div class="empty"><span>📭</span><p>Aucune dépense ce mois-ci</p></div>`;
    return;
  }
  const sorted=[...f].sort((a,b)=>b.date.localeCompare(a.date));
  let html=sorted.map(e=>{
    const c=CATS.find(c=>c.name===e.category)||{icon:"•",color:"#666"};
    return`
      <div class="hist-item">
        <div class="hist-top">
          <div class="hist-icon" style="background:${c.color}18;color:${c.color}">${c.icon}</div>
          <div class="hist-info">
            <div class="hist-desc">${esc(e.description||e.category)}</div>
            <div class="hist-meta">${new Date(e.date).toLocaleDateString("fr-FR")} · ${e.payment||""}</div>
          </div>
          <span class="hist-amount" style="color:${c.color}">${fmtGNF(e.amount)}</span>
        </div>
        <div class="hist-actions">
          <button class="hist-btn" onclick="editExp('${e.id}')">✏️ Modifier</button>
          <button class="hist-btn del" onclick="deleteExp('${e.id}')">🗑️ Supprimer</button>
        </div>
      </div>`;
  }).join("");

  html+=`<button class="reset-btn" onclick="resetAll()">🔄 Réinitialiser toutes les données</button>`;
  el.innerHTML=html;
  el.scrollTop=0;
}

function esc(s){return(s||"").replace(/"/g,"&quot;").replace(/</g,"&lt;")}

// ─── Actions ───
function selectCat(name){form.category=name;render()}
function selectPay(p){form.payment=p;render()}

function readForm(){
  form.date=document.getElementById("f-date")?.value||todayStr();
  form.amount=document.getElementById("f-amount")?.value||"";
  form.description=document.getElementById("f-desc")?.value||"";
  form.notes=document.getElementById("f-notes")?.value||"";
}

function submitForm(){
  readForm();
  if(!form.category||!form.amount||!form.date){toast("Remplis la date, catégorie et montant");return}
  const entry={...form,amount:parseFloat(form.amount),id:editingId||uid()};
  if(editingId){
    expenses=expenses.map(e=>e.id===editingId?entry:e);
    editingId=null;
  }else{
    expenses.unshift(entry);
  }
  save();
  form={date:todayStr(),category:"",description:"",amount:"",payment:"Espèces",notes:""};
  toast(editingId?"Modifiée ✓":"Dépense ajoutée ✓");
  switchView("dashboard");
}

function editExp(id){
  const e=expenses.find(x=>x.id===id);if(!e)return;
  form={...e,amount:e.amount.toString()};
  editingId=id;
  switchView("add");
}

function deleteExp(id){
  if(!confirm("Supprimer cette dépense ?"))return;
  expenses=expenses.filter(e=>e.id!==id);save();toast("Supprimée ✓");render();
}

function cancelEdit(){
  editingId=null;form={date:todayStr(),category:"",description:"",amount:"",payment:"Espèces",notes:""};
  switchView("add");
}

function resetAll(){
  if(!confirm("Supprimer TOUTES les données ? Cette action est irréversible."))return;
  expenses=[];save();toast("Données réinitialisées");render();
}

// ─── Init ───
load();updateMonthLabel();render();
</script>
</body>
</html>
